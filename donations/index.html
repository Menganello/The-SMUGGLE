<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Smuggle - Reindirizzamento...</title>
    <meta http-equiv="refresh" content="0; url=../dona/">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <style>
        body {
            background-color: #0a0a0a;
            color: #fafaf9;
            font-family: 'Inter', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 400px;
            padding: 20px;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
            color: #fafaf9;
        }

        p {
            font-size: 0.9rem;
            opacity: 0.6;
            font-weight: 300;
            margin-bottom: 2rem;
        }

        /* Premium Micro-loader */
        .loader {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(239, 132, 80, 0.1);
            border-top: 2px solid #EF8450;
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        a {
            color: #EF8450;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: opacity 0.2s;
        }

        a:hover {
            opacity: 0.8;
        }
    </style>
    <script>
        window.location.href = "../dona/";
    </script>
</head>
<body>
    <div class="container">
        <div style="display: flex; justify-content: center; margin-bottom: 1.5rem;">
            <div class="loader"></div>
        </div>
        <h1>THE SMUGGLE</h1>
        <p>Reindirizzamento in corso alla dashboard donazioni...</p>
        <a href="../dona/">Clicca qui se non vieni reindirizzato</a>
    </div>
</body>
</html>
